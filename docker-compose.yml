services:
  postgres:
    image: postgres:16
    container_name: stocklake-postgres
    environment:
      POSTGRES_DB: stocklake
      POSTGRES_USER: stocklake
      POSTGRES_PASSWORD: stocklake
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: